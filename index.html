<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="dashboard">
                <img class="dashboard-logo" alt="Logo" src="assets/images/view-dashboard.svg">
                <p>Dashboard</p>
            </div>
            <div class="navbar-main navbar">
                <div class="navbar-home icon">
                    <img class="dashboard-logo" src="assets/images/home.svg">
                    <p>Home</p>
                </div>
                <div class="navbar-profile icon">
                    <img class="dashboard-logo" src="assets/images/profile.svg">
                    <p>Profile</p>
                </div>
                <div class="navbar-messages icon">
                    <img class="dashboard-logo" src="assets/images/message.svg">
                    <p>Messages</p>
                </div>
                <div class="navbar-history icon">
                    <img class="dashboard-logo" src="assets/images/history.svg">
                    <p>History</p>
                </div>
                <div class="navbar-tasks icon">
                    <img class="dashboard-logo" src="assets/images/tasks.svg">
                    <p>Tasks</p>
                </div>
                <div class="navbar-communities icon">
                    <img class="dashboard-logo" src="assets/images/community.svg">
                    <p>Communities</p>
                </div>
            </div>
            <div class="navbar-secondary navbar">
                <div class="navbar-settings icon">
                    <img class="dashboard-logo" src="assets/images/settings.svg">
                    <p>Settings</p>
                </div>
                <div class="navbar-support icon">
                    <img class="dashboard-logo" src="assets/images/support.svg">
                    <p>Support</p>
                </div>
                <div class="navbar-privacy icon">
                    <img class="dashboard-logo" src="assets/images/privacy.svg">
                    <p>Privacy</p>
                </div>
            </div>
        </div>

        <div class="header">
            <div class="header-top-layer">
                <div class="search">
                    <div class="search-icon icon">
                        <img src="assets/images/magnify.svg">
                    </div>
                    <div class="searchbar"></div>
                </div>
                <div class="user-info">
                    <div class="bell icon">
                        <img src="assets/images/bell.svg">
                    </div>
                    <div class="user-pfp pfp">
                        <img> <!--TODO-->
                    </div>
                    <div class="username-heading">
                        <p>Haris Afridi</p>
                    </div>
                </div>
            </div>

            <div class="header-bottom-layer">
                <div class="greeting">
                    <div class="bottom-pfp big-pfp"></div>
                    <div class="greeting-text">
                        <p class="small-text">Hi there,</p>
                        <p class="large-text">Haris Afridi (@haris.afr)</p>
                    </div>
                </div>
                <div class="header-buttons">
                    <div class="header-button">
                        <p>New</p>
                    </div>
                    <div class="header-button">
                        <p>Upload</p>
                    </div>
                    <div class="header-button">
                        <p>Share</p>
                    </div>

                </div>
            </div>
        </div>

        <!-- For the main-content, use more grids to lay out the projects, announcements and trending items. -->
        <div class="main-content">
            <div class="projects">
                <p class="main-content-heading">Your Projects</p>
                <div class="temp content-card"></div>
            </div>
            <div class="announcements">
                <p class="main-content-heading">Announcements</p>
                <div class="content-card announcement-card">
                    
                </div>
            </div>
            <div class="trending">
                <p class="main-content-heading">Trending</p>
                <div class="content-card trending-card">

                </div>
            </div>
        </div>
    </div>
</body>
</html>
