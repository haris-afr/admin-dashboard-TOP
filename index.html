<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- In the sidebar, use more grids to lay out the navigation and branding sections. -->
        <div class="sidebar">
            <div class="dashboard">
                <img class="dashboard-logo" alt="Logo" src="assets/images/view-dashboard.svg">
                <p>Dashboard</p>
            </div>
            <div class="navbar-main" class="navbar">
                <div class="navbar-home" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Home</p>
                </div>
                <div class="navbar-profile" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Profile</p>
                </div>
                <div class="navbar-messages" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Messages</p>
                </div>
                <div class="navbar-history" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>History</p>
                </div>
                <div class="navbar-tasks" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Tasks</p>
                </div>
                <div class="navbar-communities" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Communities</p>
                </div>
            </div>
            <div class="navbar-secondary" class="navbar">
                <div class="navbar-settings" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Settings</p>
                </div>
                <div class="navbar-support" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Support</p>
                </div>
                <div class="navbar-privacy" class="icon">
                    <img class="dashboard-logo" src="assets/images/view-dashboard.svg">
                    <p>Privacy</p>
                </div>
            </div>
        </div>
        <div class="header">

        </div>
        <div class="main-content">

        </div>
    </div>
</body>
</html>
